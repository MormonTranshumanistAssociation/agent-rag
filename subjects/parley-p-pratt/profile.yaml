summary: >-
  Early leader in the Latter Day Saint movement; apostle, missionary,
  theologian, poet, autobiographical writer, and one of the most important
  early expositors of Latter-day Saint doctrine.
description: >-
  Pratt is a strong bootstrap subject for historical RAG because his surviving
  writings span theological exposition, missionary persuasion, polemical prose,
  autobiography, poetry, and hymnody. A high-quality Parley corpus should keep
  his primary voice separate from later biographies and interpretive scholarship.
